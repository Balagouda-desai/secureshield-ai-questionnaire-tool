<!DOCTYPE html>
<html>
<head>
<title>SecureShield AI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f8fb;
}

.header{
font-weight:600;
margin-bottom:30px;
}

.card-box{
border-radius:10px;
box-shadow:0px 2px 10px rgba(0,0,0,0.05);
}

.upload-box{
border:2px dashed #d1d5db;
border-radius:10px;
padding:30px;
text-align:center;
background:white;
}

.upload-box:hover{
border-color:#3b82f6;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="header">SecureShield AI Dashboard</h2>

<div class="row g-4">

<!-- Upload Questionnaire -->

<div class="col-md-6">

<div class="card card-box p-4">

<h5 class="mb-3">Upload Questionnaire</h5>

<form action="/upload_questionnaire" method="post" enctype="multipart/form-data">

<div class="upload-box mb-3">

<input type="file" name="file" class="form-control">

</div>

<button class="btn btn-primary w-100">
Upload Questionnaire
</button>

</form>

</div>

</div>



<!-- Upload References -->

<div class="col-md-6">

<div class="card card-box p-4">

<h5 class="mb-3">Upload Reference Documents</h5>

<form action="/upload_reference" method="post" enctype="multipart/form-data">

<div class="upload-box mb-3">

<input type="file" name="file" class="form-control">

</div>

<button class="btn btn-success w-100">
Upload Reference
</button>

</form>

</div>

</div>

</div>


<!-- Generate Answers Section -->

<div class="card card-box p-4 mt-4">

<h5 class="mb-3">Generate AI Answers</h5>

<p class="text-muted">
After uploading questionnaire and reference documents, click below to generate AI answers.
</p>

<a href="/generate_answers" class="btn btn-dark">
Generate AI Answers
</a>

</div>


<!-- Logout -->

<div class="mt-4">

<a href="/logout" class="btn btn-outline-danger">
Logout
</a>

</div>

</div>

</body>
</html>
